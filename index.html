<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca Shop</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:24px;
  background:black;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  width:200px;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
}
</style>

<script src="data.js"></script>

</head>

<body>

<header>🐜 KARINCA SHOP</header>

<div class="container" id="list"></div>

<script>
function render(){
  let box = document.getElementById("list");
  box.innerHTML = "";

  products.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} TL</p>
        <button onclick="addToCart(${p.id})">Sepete Ekle</button>
      </div>
    `;
  });
}

function addToCart(id){
  let item = products.find(p=>p.id===id);
  alert(item.name + " sepete eklendi 🐜");
}

render();
</script>

</body>
</html>
