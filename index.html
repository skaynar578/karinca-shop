<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karınca</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:#000;
  padding:22px;
  text-align:center;
  border-bottom:2px solid #222;
}

.logo{
  font-size:32px;
  font-weight:bold;
  display:inline-block;
  transform:translateX(-30px); /* KARINCA sola */
}

.logo span{
  display:block;
  font-size:16px;
  color:#e6b800;
  margin-top:6px;
  letter-spacing:2px;
  transform:translateX(20px); /* ALT YAZI sağa */
}

/* AD */
.ad-banner{
  width:100%;
  height:120px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid #222;
}

.ad-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  font-weight:bold;
}

.ad-text .title{
  color:#e6b800;
  font-size:20px;
}

.ad-text .sub{
  font-size:13px;
  color:#ccc;
}

/* CATEGORIES */
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:12px;
  background:#111;
}

.cat{
  padding:10px 14px;
  background:#1c1c1c;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#151515;
  padding:18px;
  border-radius:14px;
  text-align:center;
  transition:0.2s;
}

.card h3{
  font-size:18px;
}

.card p{
  font-size:14px;
  color:#bbb;
}

.card:hover{
  transform:scale(1.03);
}

button{
  background:#e6b800;
  border:none;
  padding:12px;
  width:100%;
  margin-top:12px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  font-size:14px;
}

/* CART */
#cart{
  position:fixed;
  right:10px;
  top:120px;
  background:#111;
  width:260px;
  padding:12px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

/* MOBİL */
@media (max-width:768px){

  .logo{
    font-size:24px;
    transform:translateX(-15px);
  }

  .logo span{
    font-size:14px;
    transform:translateX(10px);
  }

  .cat{
    font-size:13px;
    padding:10px 12px;
  }

  .card{
    padding:16px;
  }

  .card h3{
    font-size:16px;
  }

  button{
    font-size:15px;
    padding:14px;
  }

  #cart{
    position:static;
    width:95%;
    margin:10px auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    🐜 KARINCA
    <span>ALIŞVERİŞTE YENİ TREND</span>
  </div>
</header>

<div class="ad-banner">
  <div class="ad-text">
    <div class="title">BU ALANA REKLAM VEREBİLİRSİNİZ</div>
    <div class="sub">Karınca Shop</div>
  </div>
</div>

<div class="categories">
  <div class="cat">Takı</div>
  <div class="cat">Saat</div>
  <div class="cat">Çanta</div>
  <div class="cat">Kozmetik</div>


  <div class="cat">İç Giyim</div>
  <div class="cat">Kadın Giyim</div>
  <div class="cat">Erkek Giyim</div>
  <div class="cat">Çocuk Giyim</div>
  <div class="cat">Bebek Giyim</div>

  <div class="cat">Telefon</div>
  <div class="cat">Bilgisayar</div>

  <div class="cat">Ev & Yaşam</div>
  <div class="cat">Ayakkabı</div>
  <div class="cat">Spor</div>
</div>

<div class="box">
  <img src="https://images.unsplash.com/photo-1520975682031-a4c5c8bca5e2">
  <div>Takı</div>
</div>

<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";
  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
