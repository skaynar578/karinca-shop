<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karınca</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:#000;
  padding:22px;
  text-align:center;
  border-bottom:2px solid #222;
}

.logo{
  font-size:32px;
  font-weight:bold;
  display:inline-block;
  transform:translateX(-30px);
}

.logo span{
  display:block;
  font-size:16px;
  color:#e6b800;
  margin-top:6px;
  letter-spacing:2px;
  transform:translateX(20px);
}

/* AD */
.ad-banner{
  width:100%;
  height:120px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid #222;
}

.ad-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  font-weight:bold;
}

.ad-text .title{
  color:#e6b800;
  font-size:20px;
}

.ad-text .sub{
  font-size:13px;
  color:#ccc;
}

/* CATEGORIES */
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  padding:12px;
  background:#111;
}

.cat{
  background:#1c1c1c;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  width:160px;
  text-align:center;
  transition:0.2s;
}

.cat:hover{
  transform:scale(1.05);
}

.cat img{
  width:100%;
  height:100px;
  object-fit:cover;
  display:block;
}

.cat span{
  display:block;
  padding:10px;
  font-size:14px;
  font-weight:bold;
  color:#fff;
}

/* CART */
#cart{
  position:fixed;
  right:10px;
  top:120px;
  background:#111;
  width:260px;
  padding:12px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

/* MOBİL */
@media (max-width:768px){

  .logo{
    font-size:24px;
    transform:translateX(-15px);
  }

  .logo span{
    font-size:14px;
    transform:translateX(10px);
  }

  .cat{
    width:45%;
  }

  #cart{
    position:static;
    width:95%;
    margin:10px auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    🐜 KARINCA
    <span>ALIŞVERİŞTE YENİ TREND</span>
  </div>
</header>

<div class="ad-banner">
  <div class="ad-text">
    <div class="title">BU ALANA REKLAM VEREBİLİRSİNİZ</div>
    <div class="sub">Karınca Shop</div>
  </div>
</div>

<div class="categories">

  <div class="cat">
    <img src="https://picsum.photos/300/200?1">
    <span>Takı</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?2">
    <span>Saat</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?3">
    <span>Kadın Giyim</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?4">
    <span>Erkek Giyim</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?5">
    <span>Elektronik</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?6">
    <span>Ayakkabı</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?7">
    <span>Çanta</span>
  </div>

  <div class="cat">
    <img src="https://picsum.photos/300/200?8">
    <span>Kozmetik</span>
  </div>

</div>

<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";
  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
