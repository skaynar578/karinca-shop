<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  border-bottom:2px solid #222;
}

.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:20px;
}

.card{
  background:#151515;
  width:200px;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

button{
  background:#e6b800;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

#cart{
  position:fixed;
  right:10px;
  top:80px;
  background:#111;
  width:220px;
  padding:10px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

#total{
  margin-top:10px;
  font-weight:bold;
  color:#e6b800;
}

.checkout{
  background:#1f1f1f;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  text-align:center;
}
</style>
</head>

<body>

<header>🐜 KARINCA SHOP</header>

<div class="products">

  <div class="card">
    <h3>Telefon</h3>
    <p>12000 TL</p>
    <button onclick="add('Telefon',12000)">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Kulaklık</h3>
    <p>500 TL</p>
    <button onclick="add('Kulaklık',500)">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Mouse</h3>
    <p>300 TL</p>
    <button onclick="add('Mouse',300)">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Klavye</h3>
    <p>800 TL</p>
    <button onclick="add('Klavye',800)">Sepete Ekle</button>
  </div>

</div>

<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
<div id="total">Toplam: 0 TL</div>
<div class="checkout" onclick="checkout()">SİPARİŞ VER</div>
</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push({name, price});
  total += price;
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach(item=>{
    let li = document.createElement("li");
    li.innerText = item.name + " - " + item.price + " TL";
    list.appendChild(li);
  });

  document.getElementById("total").innerText = "Toplam: " + total + " TL";
}

function checkout(){
  if(cart.length === 0){
    alert("Sepet boş!");
    return;
  }

  alert("🐜 Sipariş alındı! (Simülasyon)");
  cart = [];
  total = 0;
  render();
}
</script>

</body>
</html>
