<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  border-bottom:2px solid #222;
}

.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

.cat{
  padding:8px 12px;
  background:#1c1c1c;
  border-radius:20px;
  font-size:12px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#151515;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

button{
  background:#e6b800;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

#cart{
  position:fixed;
  right:10px;
  top:80px;
  background:#111;
  width:240px;
  padding:10px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}
</style>
</head>

<body>

<header>🐜 KARINCA</header>

<div class="categories">
  <div class="cat">Telefon</div>
  <div class="cat">Bilgisayar</div>
  <div class="cat">Aksesuar</div>
  <div class="cat">Oyun</div>
  <div class="cat">Ev</div>
</div>

<div class="products">

<div class="card">
<h3>iPhone 15</h3>
<p>Yeni Nesil</p>
<button onclick="add('iPhone 15')">Sepete Ekle</button>
</div>

<div class="card">
<h3>Samsung S24</h3>
<p>Amiral Gemisi</p>
<button onclick="add('Samsung S24')">Sepete Ekle</button>
</div>

<div class="card">
<h3>MacBook Pro</h3>
<p>Profesyonel</p>
<button onclick="add('MacBook Pro')">Sepete Ekle</button>
</div>

<div class="card">
<h3>Gaming PC</h3>
<p>Yüksek Performans</p>
<button onclick="add('Gaming PC')">Sepete Ekle</button>
</div>

<div class="card">
<h3>AirPods</h3>
<p>Ses Kalitesi</p>
<button onclick="add('AirPods')">Sepete Ekle</button>
</div>

<div class="card">
<h3>Gaming Mouse</h3>
<p>Hassas Kontrol</p>
<button onclick="add('Gaming Mouse')">Sepete Ekle</button>
</div>

<div class="card">
<h3>RGB Klavye</h3>
<p>Işık Efektli</p>
<button onclick="add('RGB Klavye')">Sepete Ekle</button>
</div>

<div class="card">
<h3>PlayStation 5</h3>
<p>Oyun Konsolu</p>
<button onclick="add('PS5')">Sepete Ekle</button>
</div>

</div>

<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
