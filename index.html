<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:20px;
}

.card{
  background:#1c1c1c;
  width:200px;
  padding:15px;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#cart{
  position:fixed;
  right:10px;
  top:80px;
  background:#111;
  padding:10px;
  width:220px;
  border-radius:10px;
}

input{
  width:90%;
  padding:8px;
  margin:5px;
}

.admin{
  background:#111;
  padding:10px;
  margin:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🐜 KARINCA SHOP</header>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Admin Panel (Ürün Ekle)</h3>
<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<button onclick="addProduct()">Ürün Ekle</button>
</div>

<!-- ÜRÜNLER -->
<div class="container" id="products"></div>

<!-- SEPET -->
<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
<p id="total">Toplam: 0 TL</p>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {id:1, name:"Telefon", price:12000},
  {id:2, name:"Kulaklık", price:500}
];

let cart = [];
let total = 0;

function renderProducts(){
  let box = document.getElementById("products");
  box.innerHTML = "";

  products.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} TL</p>
        <button onclick="add(${p.id})">Sepete Ekle</button>
      </div>
    `;
  });
}

function add(id){
  let item = products.find(p=>p.id===id);
  cart.push(item);
  total += item.price;
  renderCart();
}

function renderCart(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach(c=>{
    let li = document.createElement("li");
    li.innerText = c.name + " - " + c.price + " TL";
    list.appendChild(li);
  });

  document.getElementById("total").innerText = "Toplam: " + total + " TL";
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);

  let newProduct = {
    id: Date.now(),
    name,
    price
  };

  products.push(newProduct);
  localStorage.setItem("products", JSON.stringify(products));

  renderProducts();
}

renderProducts();
</script>

</body>
</html>
