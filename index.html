<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  border-bottom:2px solid #222;
}

/* ÜST BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#111;
  border-bottom:1px solid #222;
}

.topbar .logo{
  color:#e6b800;
  font-weight:bold;
  font-size:18px;
}

.topbar input{
  width:40%;
  padding:8px;
  border:none;
  border-radius:6px;
  outline:none;
}

.topbar .menu{
  font-size:12px;
  display:flex;
  gap:10px;
}

/* REKLAM */
.ad-banner{
  width:100%;
  height:110px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid #222;
}

.ad-text{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  font-weight:bold;
}

.ad-text .title{
  color:#e6b800;
  font-size:18px;
}

.ad-text .sub{
  font-size:12px;
  color:#ccc;
}

/* KATEGORİLER */
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:#111;
}

.cat{
  padding:8px 12px;
  background:#1c1c1c;
  border-radius:20px;
  font-size:12px;
}

/* ÜRÜNLER */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#151515;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button{
  background:#e6b800;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

/* SEPET */
#cart{
  position:fixed;
  right:10px;
  top:120px;
  background:#111;
  width:240px;
  padding:10px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

/* ARAMA SONUÇ MESAJ */
#noResult{
  text-align:center;
  padding:20px;
  color:#aaa;
  display:none;
}
</style>
</head>

<body>

<header>🐜 KARINCA</header>

<div class="topbar">
  <div class="logo">Karınca Shop</div>
  <input id="searchInput" placeholder="Ürün ara...">
  <div class="menu">
    <div>Giriş</div>
    <div>Favoriler</div>
    <div>Sepet</div>
  </div>
</div>

<div class="ad-banner">
  <div class="ad-text">
    <div class="title">REKLAM ALANI</div>
    <div class="sub">Karınca Shop</div>
  </div>
</div>

<!-- KATEGORİLER (ASLA ETKİLENMEZ) -->
<div class="categories">
  <div class="cat">Takı</div>
  <div class="cat">Çanta</div>
  <div class="cat">Kozmetik</div>
  <div class="cat">İç Giyim</div>
  <div class="cat">Kadın Giyim</div>
  <div class="cat">Erkek Giyim</div>
  <div class="cat">Çocuk Giyim</div>
  <div class="cat">Bebek Giyim</div>
  <div class="cat">Elektronik</div>
  <div class="cat">Telefon</div>
  <div class="cat">Bilgisayar</div>
  <div class="cat">Oyun</div>
</div>

<!-- ÜRÜNLER -->
<div class="products" id="productArea">

<div class="card"><h3>iPhone 15</h3><button onclick="add('iPhone 15')">Sepete Ekle</button></div>
<div class="card"><h3>Samsung S24</h3><button onclick="add('Samsung S24')">Sepete Ekle</button></div>
<div class="card"><h3>MacBook Pro</h3><button onclick="add('MacBook Pro')">Sepete Ekle</button></div>
<div class="card"><h3>Gaming PC</h3><button onclick="add('Gaming PC')">Sepete Ekle</button></div>
<div class="card"><h3>AirPods</h3><button onclick="add('AirPods')">Sepete Ekle</button></div>

</div>

<div id="noResult">❌ Ürün bulunamadı</div>

<!-- SEPET -->
<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";
  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}

/* 🔥 GELİŞMİŞ ARAMA SİSTEMİ */
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");
const noResult = document.getElementById("noResult");

function search(){
  let val = input.value.toLowerCase().trim();
  let visibleCount = 0;

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();

    if(val === "" || text.includes(val)){
      card.style.display = "block";
      visibleCount++;
    } else {
      card.style.display = "none";
    }
  });

  noResult.style.display = visibleCount === 0 ? "block" : "none";
}

/* ENTER + LIVE SEARCH */
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    search();
  }
});

input.addEventListener("input", search);
</script>

</body>
</html>
