<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Karınca Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  border-bottom:2px solid #222;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#151515;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button{
  background:#e6b800;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

/* SEPET */
#cart{
  position:fixed;
  right:10px;
  top:80px;
  background:#111;
  width:240px;
  padding:10px;
  border-radius:10px;
}

.checkout{
  background:#1f1f1f;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  text-align:center;
}

/* FORM */
#formBox{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:8px;
  margin-top:10px;
  border:none;
}

.send{
  margin-top:10px;
  background:#e6b800;
  padding:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🐜 KARINCA SHOP</header>

<div class="products">

  <div class="card">
    <h3>Telefon</h3>
    <button onclick="add('Telefon')">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Kulaklık</h3>
    <button onclick="add('Kulaklık')">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Mouse</h3>
    <button onclick="add('Mouse')">Sepete Ekle</button>
  </div>

  <div class="card">
    <h3>Klavye</h3>
    <button onclick="add('Klavye')">Sepete Ekle</button>
  </div>

</div>

<!-- SEPET -->
<div id="cart">
<h3>Sepet</h3>
<ul id="list"></ul>
<div class="checkout" onclick="openForm()">Sipariş Ver</div>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Sipariş Bilgisi</h3>
<input id="name" placeholder="Ad Soyad">
<input id="phone" placeholder="Telefon">
<input id="address" placeholder="Adres">

<div class="send" onclick="sendOrder()">Gönder</div>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}

function openForm(){
  if(cart.length === 0){
    alert("Sepet boş!");
    return;
  }
  document.getElementById("formBox").style.display="block";
}

function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let message = "Yeni Sipariş:%0A";
  
  cart.forEach(i=>{
    message += "- " + i + "%0A";
  });

  message += "%0AAd: " + name;
  message += "%0ATel: " + phone;
  message += "%0AAdres: " + address;

  let whatsapp = "https://wa.me/905XXXXXXXXX?text=" + message;

  window.open(whatsapp, "_blank");

  cart = [];
  render();
  document.getElementById("formBox").style.display="none";
}
</script>

</body>
</html>
