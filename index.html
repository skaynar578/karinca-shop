<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karınca</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}
header{
  background:#000;
  padding:22px;
  text-align:center;
  border-bottom:2px solid #222;
}
.logo{
  font-size:32px;
  font-weight:bold;
  display:inline-block;
  transform:translateX(-30px);
}
.logo span{
  display:block;
  font-size:16px;
  color:#e6b800;
  margin-top:6px;
  letter-spacing:2px;
  transform:translateX(20px);
}
.ad-banner{
  width:100%;
  height:120px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid #222;
}
.ad-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  font-weight:bold;
}
.ad-text .title{
  color:#e6b800;
  font-size:20px;
}
.ad-text .sub{
  font-size:13px;
  color:#ccc;
}
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:12px;
  background:#111;
}
.cat{
  padding:10px 14px;
  background:#1c1c1c;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}
.cat:hover{
  background:#e6b800;
  color:#000;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}
.card{
  background:#151515;
  padding:18px;
  border-radius:14px;
  text-align:center;
  transition:0.2s;
}
.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:12px;
}
.card h3{
  font-size:18px;
  margin:8px 0;
}
.card p{
  font-size:14px;
  color:#bbb;
}
.card:hover{
  transform:scale(1.03);
}
button{
  background:#e6b800;
  border:none;
  padding:12px;
  width:100%;
  margin-top:12px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  font-size:14px;
}
#cart{
  position:fixed;
  right:10px;
  top:120px;
  background:#111;
  width:260px;
  padding:12px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}
@media (max-width:768px){
  .logo{ font-size:24px; transform:translateX(-15px); }
  .logo span{ font-size:14px; transform:translateX(10px); }
  #cart{ position:static; width:95%; margin:10px auto; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    🐜 KARINCA
    <span>ALIŞVERİŞTE YENİ TREND</span>
  </div>
</header>

<div class="ad-banner">
  <div class="ad-text">
    <div class="title">BU ALANA REKLAM VEREBİLİRSİNİZ</div>
    <div class="sub">Karınca Shop</div>
  </div>
</div>

<div class="categories">
  <div class="cat">Takı</div>
  <div class="cat">Saat</div>
  <div class="cat">Çanta</div>
  <div class="cat">Kozmetik</div>
  <div class="cat">İç Giyim</div>
  <div class="cat">Kadın Giyim</div>
  <div class="cat">Erkek Giyim</div>
  <div class="cat">Çocuk Giyim</div>
  <div class="cat">Bebek Giyim</div>
  <div class="cat">Telefon</div>
  <div class="cat">Bilgisayar</div>
  <div class="cat">Ev & Yaşam</div>
  <div class="cat">Ayakkabı</div>
  <div class="cat">Spor</div>
</div>

<div class="products" id="products"></div>

<div id="cart">
  <h3>Sepet</h3>
  <ul id="list"></ul>
</div>

<script>
let cart = [];

function add(name){
  cart.push(name);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";
  cart.forEach(i => {
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}

const products = [
  {name:"Altın Kolye", category:"Takı", img:"https://picsum.photos/id/1015/300/300"},
  {name:"Gümüş Bileklik", category:"Takı", img:"https://picsum.photos/id/133/300/300"},
  {name:"Rolex Tarzı Saat", category:"Saat", img:"https://picsum.photos/id/201/300/300"},
  {name:"Deri Kol Saati", category:"Saat", img:"https://picsum.photos/id/367/300/300"},
  {name:"Siyah Omuz Çantası", category:"Çanta", img:"https://picsum.photos/id/180/300/300"},
  {name:"Kırmızı Clutch Çanta", category:"Çanta", img:"https://picsum.photos/id/251/300/300"},
  {name:"Matte Ruj Seti", category:"Kozmetik", img:"https://picsum.photos/id/669/300/300"},
  {name:"Fondöten + Palet", category:"Kozmetik", img:"https://picsum.photos/id/1011/300/300"},
  {name:"Lace Sütyen Takımı", category:"İç Giyim", img:"https://picsum.photos/id/1027/300/300"},
  {name:"Siyah Elbise", category:"Kadın Giyim", img:"https://picsum.photos/id/1016/300/300"},
  {name:"Kot Ceket", category:"Erkek Giyim", img:"https://picsum.photos/id/106/300/300"},
  {name:"Çocuk Sweatshirt", category:"Çocuk Giyim", img:"https://picsum.photos/id/102/300/300"},
  {name:"Bebek Tulumu", category:"Bebek Giyim", img:"https://picsum.photos/id/145/300/300"},
  {name:"iPhone 16 Kılıf", category:"Telefon", img:"https://picsum.photos/id/201/300/300"},
  {name:"Gaming Laptop", category:"Bilgisayar", img:"https://picsum.photos/id/180/300/300"},
  {name:"Modern Abajur", category:"Ev & Yaşam", img:"https://picsum.photos/id/251/300/300"},
  {name:"Beyaz Spor Ayakkabı", category:"Ayakkabı", img:"https://picsum.photos/id/21/300/300"},
  {name:"Koşu Ayakkabısı", category:"Spor", img:"https://picsum.photos/id/201/300/300"}
];

function loadProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${product.img}" alt="${product.name}">
      <h3>${product.name}</h3>
      <p>${product.category}</p>
      <button onclick="add('${product.name}')">Sepete Ekle</button>
    `;
    container.appendChild(card);
  });
}

window.onload = loadProducts;
</script>
</body>
</html>
